<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EUDR Traceability Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root {
  --ink: #0f1e35;
  --muted: #6b7a94;
  --line: #e3e8f0;
  --bg: #f2f5f9;
  --card: #ffffff;
  --green: #0e7c4a;
  --green-soft: #e6f7ef;
  --blue: #1559c4;
  --blue-soft: #eaf0fd;
  --amber: #a05c00;
  --amber-soft: #fff4e0;
  --accent: #1559c4;
  --accent2: #0e7c4a;
  --red: #c0392b;
  --red-soft: #fdecea;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Be Vietnam Pro', Arial, sans-serif;
  font-size: 13px;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* ── LANG TOGGLE ── */
.lang-btn {
  position: fixed; top: 14px; right: 16px; z-index: 9999;
  display: flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.25);
  border-radius: 999px; padding: 5px 12px;
  font: 700 11px 'Be Vietnam Pro', sans-serif; color: #fff;
  cursor: pointer; transition: .15s; backdrop-filter: blur(8px);
}
.lang-btn:hover { background: rgba(255,255,255,.2); }
.lang-btn.dark {
  background: var(--bg); border-color: var(--line); color: var(--ink);
}
.lang-btn.dark:hover { background: var(--line); }

/* ── SEARCH SCREEN ── */
#search-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  background: linear-gradient(160deg, #0a1e3d 0%, #0f2d5a 55%, #0e3d2a 100%);
}

.brand-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 36px;
}
.brand-dot {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #2ecc71, #1abc9c);
  border-radius: 10px;
  display: grid; place-items: center;
  font-size: 18px;
}
.brand-label {
  font-size: 13px;
  font-weight: 700;
  color: rgba(255,255,255,.55);
  letter-spacing: .08em;
  text-transform: uppercase;
}

.search-title {
  font-size: 28px;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.02em;
  text-align: center;
  line-height: 1.25;
  margin-bottom: 8px;
}
.search-sub {
  font-size: 13px;
  color: rgba(255,255,255,.45);
  text-align: center;
  margin-bottom: 36px;
}

.search-box {
  background: #fff;
  border-radius: 16px;
  padding: 6px 6px 6px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  max-width: 520px;
  box-shadow: 0 24px 60px rgba(0,0,0,.28);
  margin-bottom: 16px;
}
.search-box input {
  flex: 1;
  border: none;
  outline: none;
  font: 700 15px 'Be Vietnam Pro', sans-serif;
  color: var(--ink);
  background: transparent;
  letter-spacing: .02em;
}
.search-box input::placeholder { color: #b0bac9; font-weight: 400; }
.search-btn {
  background: linear-gradient(135deg, #1559c4, #0e3d8c);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 22px;
  font: 700 13px 'Be Vietnam Pro', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  transition: .15s;
}
.search-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(21,89,196,.4); }
.search-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

.search-hint {
  font-size: 11px;
  color: rgba(255,255,255,.3);
  text-align: center;
}
.search-hint span { color: rgba(255,255,255,.55); font-weight: 600; }

#search-error {
  display: none;
  background: rgba(192,57,43,.15);
  border: 1px solid rgba(192,57,43,.3);
  border-radius: 10px;
  padding: 10px 16px;
  color: #ff8a80;
  font-size: 12px;
  margin-top: 12px;
  max-width: 520px;
  width: 100%;
  text-align: center;
}

/* ── RESULT SCREEN ── */
#result-screen { display: none; }

/* Topbar */
.topbar {
  background: #fff;
  border-bottom: 1px solid var(--line);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 500;
}
.topbar-left { display: flex; align-items: center; gap: 14px; }
.back-btn {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 8px;
  padding: 6px 12px;
  font: 600 12px 'Be Vietnam Pro', sans-serif;
  cursor: pointer;
  color: var(--muted);
  display: flex; align-items: center; gap: 6px;
  transition: .14s;
}
.back-btn:hover { background: var(--bg); }
.topbar-code {
  font-size: 15px;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: .04em;
}
.topbar-right { display: flex; gap: 8px; }
.btn-secondary {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 8px;
  padding: 7px 14px;
  font: 600 12px 'Be Vietnam Pro', sans-serif;
  cursor: pointer;
  color: var(--ink);
  transition: .14s;
}
.btn-secondary:hover { background: var(--bg); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 7px 14px;
  font: 700 12px 'Be Vietnam Pro', sans-serif;
  cursor: pointer;
  transition: .14s;
}
.btn-primary:hover { background: #0e3d8c; }

.shell { max-width: 1100px; margin: 0 auto; padding: 24px 20px 48px; display: flex; flex-direction: column; gap: 16px; }

/* ── HERO ── */
.hero {
  background: linear-gradient(135deg, #0a1e3d 0%, #0f2d5a 70%, #0e3d2a 100%);
  border-radius: 18px;
  padding: 28px 32px;
  color: #fff;
  position: relative;
  overflow: hidden;
}
.hero::after {
  content: '';
  position: absolute;
  width: 340px; height: 340px;
  border-radius: 50%;
  right: -120px; top: -200px;
  border: 60px solid rgba(46,204,113,.1);
  pointer-events: none;
}
.hero-grid { display: grid; grid-template-columns: 1fr auto; gap: 24px; align-items: start; position: relative; z-index: 1; }
.hero-eyebrow {
  font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: #7defa8; display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.hero-eyebrow::before { content: ''; width: 24px; height: 2px; background: #2ecc71; }
.hero-title { font-size: 26px; font-weight: 800; line-height: 1.2; letter-spacing: -.02em; margin-bottom: 8px; }
.hero-desc { font-size: 12px; color: rgba(255,255,255,.5); max-width: 500px; line-height: 1.6; }

.status-verified {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(46,204,113,.15); border: 1px solid rgba(46,204,113,.3);
  border-radius: 999px; padding: 6px 12px;
  font-size: 11px; font-weight: 700; color: #7defa8;
  margin-top: 14px;
}

.hero-stats { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }
.hero-stat {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 10px;
  padding: 10px 14px;
}
.hero-stat-val { font-size: 20px; font-weight: 800; line-height: 1; }
.hero-stat-lbl { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 3px; font-weight: 500; }

/* ── SECTION ── */
.section-head {
  display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
}
.section-num {
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--accent); color: #fff;
  font-size: 10px; font-weight: 800;
  display: grid; place-items: center; flex-shrink: 0;
}
.section-title { font-size: 14px; font-weight: 700; }
.section-sub { font-size: 11px; color: var(--muted); margin-left: auto; }

/* ── INFO CARD ── */
.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 18px 20px;
}
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 20px; }
.info-item label {
  display: block; font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .05em; color: var(--muted); margin-bottom: 3px;
}
.info-item .val { font-size: 12px; font-weight: 600; }
.span-2 { grid-column: span 2; }

/* ── METRIC STRIP ── */
.metric-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--line);
  border-radius: 14px;
  overflow: hidden;
  background: var(--card);
}
.metric-item {
  padding: 16px 18px;
  border-right: 1px solid var(--line);
}
.metric-item:last-child { border-right: none; }
.metric-lbl { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
.metric-val { font-size: 22px; font-weight: 800; margin-top: 4px; line-height: 1; }
.metric-note { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── TWO COL ── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── TABLE ── */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.data-table th {
  padding: 8px 12px; text-align: left;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .04em; color: var(--muted);
  border-bottom: 2px solid var(--line);
  background: #f8fafc;
  white-space: nowrap;
}
.data-table td { padding: 9px 12px; border-bottom: 1px solid #f0f3f8; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr:hover td { background: #f7fbff; }
.mono { font-family: ui-monospace, monospace; font-size: 10.5px; }

/* ── PILL ── */
.pill {
  display: inline-flex; padding: 3px 8px; border-radius: 999px;
  font-size: 10px; font-weight: 700;
}
.pill-green { background: var(--green-soft); color: var(--green); }
.pill-blue  { background: var(--blue-soft); color: var(--blue); }
.pill-amber { background: var(--amber-soft); color: var(--amber); }
.pill-gray  { background: #f0f3f8; color: #5a6478; }
.pill-red   { background: var(--red-soft); color: var(--red); }

/* ── MAP ── */
#map { height: 360px; border-radius: 12px; overflow: hidden; }
.map-card { border: 1px solid var(--line); border-radius: 14px; overflow: hidden; background: var(--card); }
.map-toolbar {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--line);
}
.map-legend { display: flex; gap: 12px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

/* ── LOADING ── */
.loading-wrap {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 60px 20px; gap: 14px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--line);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── INLINE SEARCH (topbar) ── */
.topbar-search {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg); border: 1.5px solid var(--line);
  border-radius: 8px; padding: 4px 6px 4px 12px;
  flex: 1; max-width: 340px;
}
.topbar-search input {
  border: none; outline: none; background: transparent;
  font: 600 13px 'Be Vietnam Pro', sans-serif; color: var(--ink);
  width: 100%;
}
.topbar-search input::placeholder { color: #b0bac9; font-weight: 400; }
.topbar-search-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 6px; padding: 5px 12px;
  font: 700 12px 'Be Vietnam Pro', sans-serif; cursor: pointer;
  white-space: nowrap; transition: .14s;
}
.topbar-search-btn:hover { background: #0e3d8c; }

/* ── CUSTOMER PAGE ── */
#customer-screen { display: none; }
.kh-order-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr auto;
  align-items: center; gap: 12px;
  padding: 12px 16px; border-bottom: 1px solid var(--line);
  cursor: pointer; transition: background .12s;
}
.kh-order-row:hover { background: #f7fbff; }
.kh-order-row:last-child { border-bottom: none; }

/* ── EMPTY / ERROR ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 48px 24px; gap: 10px; text-align: center;
}
.empty-icon { font-size: 32px; opacity: .4; }
.empty-title { font-size: 14px; font-weight: 700; color: var(--ink); }
.empty-sub { font-size: 12px; color: var(--muted); }

/* ── SUPPLY CHAIN TIMELINE ── */
.timeline { display: flex; gap: 0; align-items: flex-start; position: relative; padding: 0 4px; }
.timeline::before {
  content: ''; position: absolute;
  left: calc(40px / 2); right: calc(40px / 2); top: 20px;
  height: 2px; background: var(--line);
}
.step { flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; position: relative; z-index: 1; }
.step-icon {
  width: 40px; height: 40px; border-radius: 50%;
  display: grid; place-items: center; font-size: 16px;
  background: var(--card); border: 2px solid var(--line);
}
.step.done .step-icon { background: var(--accent); border-color: var(--accent); }
.step strong { font-size: 11px; }
.step span { font-size: 10px; color: var(--muted); line-height: 1.4; }

@media (max-width: 768px) {
  .hero-grid { grid-template-columns: 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .info-grid { grid-template-columns: 1fr; }
  .span-2 { grid-column: auto; }
  .metric-strip { grid-template-columns: 1fr 1fr; }
  .metric-item:nth-child(2) { border-right: none; }
  .metric-item:nth-child(3) { border-right: 1px solid var(--line); }
  .shell { padding: 16px 12px 36px; }
  .search-title { font-size: 22px; }
}

@media print {
  .topbar, .back-btn, .btn-primary, .btn-secondary { display: none !important; }
  body { background: #fff; }
  .shell { padding: 0; }
  .hero { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}
</style>
</head>

  <div class="search-box">
    <span style="font-size:16px;opacity:.4">🔍</span>

</div>

<!-- ═══════════════════════════════
     CUSTOMER SCREEN
═══════════════════════════════ -->
<div id="customer-screen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goBackFromCustomer()" id="kh-back-btn">← Quay lại</button>
      <span class="topbar-code" id="kh-name-tb">—</span>

    <div class="topbar-right">
      <div class="topbar-search">

      </div>
    </div>
  </div>
  <div class="shell" id="customer-content"></div>
</div>

<!-- ═══════════════════════════════
     RESULT SCREEN
═══════════════════════════════ -->
<div id="result-screen">
  <div class="topbar">
    <div class="topbar-left">
      <button class="back-btn" onclick="goBack()">← Trang chủ</button>
      <span class="topbar-code" id="tb-code">—</span>
    </div>
    <div class="topbar-right">
      <div class="topbar-search">
        <span style="font-size:14px;opacity:.4">🔍</span>
        <input type="text" id="inline-search-input" placeholder="Tra cứu mã khác..." autocomplete="off"
          onkeydown="if(event.key==='Enter') doSearchFromTopbar()">
        <button class="topbar-search-btn" onclick="doSearchFromTopbar()">Tra cứu</button>
      </div>
      <button class="btn-secondary" onclick="window.print()">↧ Xuất PDF</button>
    </div>
  </div>

  <div class="shell" id="result-content">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <span style="font-size:12px;color:var(--muted)">Đang tải dữ liệu...</span>
    </div>
  </div>
</div>

// GOOGLE SHEETS FETCH — gviz/tq API (hỗ trợ CORS từ file://)
// ═══════════════════════════════════════════════════════════
function gvizUrl(gid) {
  return 'https://docs.google.com/spreadsheets/d/' + SHEET_ID
    + '/gviz/tq?tqx=out:json&gid=' + gid;
}

function parseGviz(text) {
  // Response: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
  var jsonStr = text.replace(/^\/\*[\s\S]*?\*\/\s*/, '').replace(/^google\.visualization\.Query\.setResponse\(/, '').replace(/\);?\s*$/, '');
  var data = JSON.parse(jsonStr);
  var cols = (data.table.cols || []).map(function(c) { return (c.label || c.id || '').trim(); });
  var rows = [];
  (data.table.rows || []).forEach(function(row) {
    var obj = {};
    var hasData = false;
    cols.forEach(function(col, i) {
      var cell = row.c && row.c[i];
      var v = '';
      if (cell && cell.v !== null && cell.v !== undefined) {
        v = String(cell.f || cell.v).trim();
      }
      obj[col] = v;
      if (v) hasData = true;
    });
    if (hasData) rows.push(obj);
  });
  return rows;
}

function fetchCsv(gid) {
  return fetch(gvizUrl(gid))
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(parseGviz);
}

var searchInput = document.getElementById('search-input');
var searchBtn   = document.getElementById('search-btn');
var searchError = document.getElementById('search-error');

searchInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

function doSearch() {
  var raw = searchInput.value.trim();
  if (!raw) { showError('Vui lòng nhập mã xuất kho.'); return; }

  // Normalize:
  // "XK260626-01" → giữ nguyên (format đặc biệt có ngày)
  // "xk260626-01" → "XK260626-01"
  // "XK_1", "XK-1", "XK1", "xk1" → "XK_1"
  var code = raw.toUpperCase().trim();

  if (!/^XK/i.test(code)) {
    showError('Mã không hợp lệ. Mã phải bắt đầu bằng XK (VD: XK260626-01 hoặc XK_1).');
    return;
  }

  // Nếu không phải format có ngày (XKddmmyy-nn), normalize về XK_n
  if (!/^XK\d{6}-\d+$/.test(code)) {
    code = code.replace(/^XK[\-_\s]*(\d+)$/i, 'XK_$1');
    if (!/^XK_\d+$/.test(code)) {
      showError('Mã không hợp lệ. Định dạng đúng: XK260626-01 hoặc XK_1, XK_2...');
      return;
    }
  }

  hideError();
  searchBtn.disabled = true;
  searchBtn.textContent = '⏳ Đang tải...';

  // Show result screen in loading state
  document.getElementById('search-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  setTimeout(function(){ var btn=document.getElementById('lang-toggle-btn'); if(btn) btn.className='lang-btn dark'; }, 10);
  document.getElementById('tb-code').textContent = code;
  document.getElementById('result-content').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><span style="font-size:12px;color:var(--muted)">' + t('loading') + '</span></div>';

  Promise.all([
    fetchCsv(SHEET_GIDS.fact_xuat_kho),
    fetchCsv(SHEET_GIDS.fact_xuat_kho_plot)
  ]).then(function(results) {
    var orders = results[0];
    var plots  = results[1];

    var order = orders.filter(function(r) { return r.MA_XK === code; })[0];
    if (!order) {
      var similar = orders.map(function(r) { return r.MA_XK; }).filter(Boolean).slice(0,5).join(', ');
      showResultError(t('errNotFound').replace('{code}', code),
        similar ? t('errAvailable') + similar : '');
      return;
    }

    var orderPlots = plots.filter(function(r) { return r.MA_XK === code; });
    renderResult(code, order, orderPlots);
  }).catch(function(err) {
    console.error(err);
    showResultError(t('errConnect'), t('errConnectSub'));
  }).finally(function() {
    searchBtn.disabled = false;
    searchBtn.textContent = 'Tra cứu';
  });
}

function showError(msg) {
  searchError.innerHTML = msg;
  searchError.style.display = 'block';
}
function hideError() {
  searchError.style.display = 'none';
}
function showResultError(title, sub) {
  document.getElementById('result-content').innerHTML =
    '<div class="empty-state"><div class="empty-icon">🔍</div>'
    + '<div class="empty-title">' + title + '</div>'
    + '<div class="empty-sub">' + sub + '</div>'
    + '<button class="btn-primary" style="margin-top:16px" onclick="goBack()">' + t('errRetry') + '</button>'
    + '</div>';
}

function goBack() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'flex';
  searchInput.focus();
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
}

  var num = parseFloat(String(n).replace(/,/g, ''));
  if (isNaN(num)) return n || '—';
  return num.toLocaleString('vi-VN', { maximumFractionDigits: 2 });
}

function fmtDate(d) {

  // Helper: render nhiều mã + nhiều link thành các dòng con
  // dateLabel: tên loại ngày hiển thị nhỏ dưới giá trị ngày
  function chainRow(level, icon, maCols, ngay, tickets, dateLabel) {
    var codes = (maCols || '').split(',').map(function(s){return s.trim();}).filter(Boolean);
    var dates  = (ngay   || '').split(',').map(function(s){return s.trim();}).filter(Boolean);
    var links  = (tickets|| '').split(',').map(function(s){return s.trim();}).filter(Boolean);
    var maxRow = Math.max(codes.length, 1);
    var out = '';
    for (var i = 0; i < maxRow; i++) {
      out += '<tr>';
      if (i === 0) {
        out += '<td rowspan="' + maxRow + '" style="vertical-align:middle;white-space:nowrap">'
          + '<span style="font-size:16px">' + icon + '</span>'
          + '<span style="font-size:11px;font-weight:700;margin-left:6px">' + level + '</span></td>';
      }
      var c = codes[i] || '—';
      out += '<td class="mono" style="font-weight:600">' + c + '</td>';
      var dval = dates[i] || dates[0] || '—';
      out += '<td><span style="font-size:12px">' + dval + '</span>'
        + (dateLabel ? '<br><span style="font-size:9.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em">' + dateLabel + '</span>' : '')
        + '</td>';
      if (links[i]) {
        var shortId = links[i].replace(/.*\//, '');
        out += '<td><a href="' + links[i] + '" target="_blank" style="color:var(--accent);font-size:11px;font-weight:600">#' + shortId + ' ↗</a></td>';
      } else {
        out += '<td style="color:var(--muted)">—</td>';
      }
      out += '</tr>';
    }
    return out;
  }

  html += chainRow(t('chainD'), '📦', order.MA_D, order.NGAY_XUAT,      order.TICKET_D, t('chainDateD'));
  html += chainRow(t('chainC'), '⚙️', order.MA_C, order.NGAY_CHE_BIEN,  order.TICKET_C, t('chainDateC'));
  html += chainRow(t('chainB'), '🪣', order.MA_B, order.NGAY_GOM_LO,    order.TICKET_B, t('chainDateB'));
  html += chainRow(t('chainA'), '🌿', order.MA_A, order.NGAY_GIAO_NHAN, '',             t('chainDateA'));

  html += '</tbody></table></div></div>';

  // Timeline — thêm bước "Gom lô / Bãi ủ" giữa Thu gom và Chế biến
  html += '<div class="card" style="margin-top:14px">';
  html += '<div style="font-size:11px;font-weight:700;margin-bottom:16px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em">' + t('timelineTitle') + '</div>';
  html += '<div class="timeline">';
  var steps = [
    {icon:'🌿', label:t('tlPlot'),     sub:t('tlPlotSub'),                             done: plots.length > 0},
    {icon:'🪣', label:t('tlCollect'),  sub:'Code A: ' + (order.MA_A || '—').split(',')[0].trim(), done: !!order.MA_A},
    {icon:'🏗️', label:t('tlBatch'),   sub:'Code B: ' + (order.MA_B || '—').split(',')[0].trim(), done: !!order.MA_B},
    {icon:'⚙️', label:t('tlProcess'), sub:'Code C: ' + (order.MA_C || '—').split(',')[0].trim(), done: !!order.MA_C},
    {icon:'📦', label:t('tlProduct'), sub:'Code D: ' + (order.MA_D || '—').split(',')[0].trim(), done: !!order.MA_D},
    {icon:'🚚', label:t('tlExport'),   sub:'Code: ' + code,                           done: true},
  ];
  steps.forEach(function(s) {
    html += '<div class="step ' + (s.done ? 'done' : '') + '">';
    html += '<div class="step-icon">' + (s.done ? '<span style="color:#fff;font-size:14px">✓</span>' : s.icon) + '</div>';
    html += '<strong>' + s.label + '</strong>';
    html += '<span>' + s.sub + '</span>';
    html += '</div>';
  });
  html += '</div></div>';
  html += '</div>'; // section

  // ── SECTION 3: BẢN ĐỒ ──
  html += '<div>';
  html += sectionHead('03', t('sec03'), plots.length + ' ' + t('heroPlots'));

  if (plots.length > 0) {
    var validPlots = plots.filter(function(p) { return p.KINH_DO && p.VI_DO && parseFloat(p.KINH_DO) && parseFloat(p.VI_DO); });
    html += '<div class="map-card">';
    html += '<div class="map-toolbar">';
    html += '<span style="font-size:11px;font-weight:700">' + (LANG==='en'?'Plantation Area Distribution':'Phân bổ vùng nguyên liệu') + '</span>';
    html += '<div class="map-legend">';
    html += '<span><span class="legend-dot" style="background:#1559c4"></span><span style="font-size:10px">' + (LANG==='en'?'Plantation':'Vùng trồng') + '</span></span>';
    html += '<span><span class="legend-dot" style="background:#0e7c4a"></span><span style="font-size:10px">' + (LANG==='en'?'Certified':'Có giấy phép') + '</span></span>';
    html += '</div></div>';
    html += '<div id="map"></div></div>';
  } else {
    html += '<div class="card"><div class="empty-state"><div class="empty-icon">📍</div><div class="empty-title">' + (LANG==='en'?'No coordinate data':'Chưa có dữ liệu tọa độ') + '</div><div class="empty-sub">' + (LANG==='en'?'Plantation plots have not been geolocated':'Các lô vùng trồng chưa được gắn tọa độ định vị') + '</div></div></div>';
  }
  html += '</div>'; // section

  // ── SECTION 4: DANH SÁCH LÔ VÙNG TRỒNG ──
  html += '<div>';
  html += sectionHead('04', t('sec04'), plots.length + ' ' + t('heroPlots'));

  html += '<div class="card">';
  if (plots.length > 0) {
    html += '<div class="table-wrap"><table class="data-table">';
    html += '<thead><tr>'
      + '<th>' + t('plotNum') + '</th>'
      + '<th>' + t('plotId') + '</th>'
      + '<th>' + t('plotTo') + '</th>'
      + '<th>' + t('plotArea') + '</th>'
      + '<th>' + t('plotYear') + '</th>'
      + '<th>' + t('plotStart') + '</th>'
      + '<th>' + t('plotStatus') + '</th>'
      + '<th>' + t('plotCert') + '</th>'
      + '<th>' + t('plotCoord') + '</th>'
      + '</tr></thead><tbody>';

    plots.forEach(function(p, i) {
      var hasCert = p.BANG_CHUNG_PHAP_LY && p.BANG_CHUNG_PHAP_LY !== '—' && p.BANG_CHUNG_PHAP_LY !== '';
      var isActive = p.TINH_TRANG_KHAI_THAC === 'Đang khai thác' || p.TINH_TRANG_KHAI_THAC === 'Active harvesting';
      html += '<tr>';
      html += '<td style="color:var(--muted)">' + (i+1) + '</td>';
      html += '<td class="mono"><strong>' + (p.PLOT_ID || '—') + '</strong></td>';
      html += '<td>' + (p.TO || '—') + '</td>';
      html += '<td><strong>' + fmt(p.DIEN_TICH_HA) + '</strong></td>';
      html += '<td>' + (p.NAM_TRONG || '—') + '</td>';
      html += '<td>' + (p.NAM_BAT_DAU_KHAI_THAC || '—') + '</td>';
      var statusTxt = p.TINH_TRANG_KHAI_THAC || '—';
      if (LANG === 'en') {
        statusTxt = statusTxt === 'Đang khai thác' ? 'Active' : statusTxt === 'Tạm dừng' ? 'On hold' : statusTxt === 'Ngừng' ? 'Stopped' : statusTxt;
      }
      html += '<td>' + pill(statusTxt, isActive ? 'pill-green' : 'pill-amber') + '</td>';
      html += '<td>' + (hasCert ? pill(p.BANG_CHUNG_PHAP_LY, 'pill-blue') : pill(t('plotCertMissing'), 'pill-gray')) + '</td>';
      var lat = parseFloat(p.VI_DO), lng = parseFloat(p.KINH_DO);
      html += '<td class="mono" style="font-size:10px">' + (lat && lng ? lat.toFixed(4) + ', ' + lng.toFixed(4) : '—') + '</td>';
      html += '</tr>';
    });

    // Footer tổng
    html += '<tfoot><tr>'
      + '<td colspan="3" style="font-weight:700;padding:9px 12px;background:#f8fafc;border-top:2px solid var(--line)">' + t('plotTotal') + '</td>'
      + '<td style="font-weight:800;padding:9px 12px;background:#f8fafc;border-top:2px solid var(--line)">' + fmt(totalArea) + ' ha</td>'
      + '<td colspan="3" style="padding:9px 12px;background:#f8fafc;border-top:2px solid var(--line)"></td>'
      + '<td style="padding:9px 12px;background:#f8fafc;border-top:2px solid var(--line)">'
        + certCount + '/' + plots.length + ' ' + t('heroCert')
      + '</td>'
      + '<td style="padding:9px 12px;background:#f8fafc;border-top:2px solid var(--line)">'
        + activeCount + '/' + plots.length + ' ' + t('plotActive').toLowerCase()
      + '</td>'
      + '</tr></tfoot>';

    html += '</tbody></table></div>';
  } else {
    html += '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">' + (LANG==='en'?'No plantation plot data':'Không có dữ liệu lô vùng trồng') + '</div><div class="empty-sub">' + (LANG==='en'?'This export order has no linked plantation plots':'Đơn xuất kho này chưa được liên kết với vùng trồng') + '</div></div>';
  }
  html += '</div></div>'; // card, section

  // ── SECTION 5: XÁC THỰC ──
  html += '<div>';
  html += sectionHead('05', t('sec05'), '');
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';

  var na = LANG === 'en' ? 'Not assigned' : 'Chưa gắn';
  var checks = [
    { ok: plots.length > 0, label: t('verifyCoord'), sub: plots.length + ' ' + t('verifyCoordSub') },
    { ok: certCount > 0, label: t('verifyCert'), sub: certCount + '/' + plots.length + ' ' + t('verifyCertSub') },
    { ok: !!order.MA_C, label: t('verifyC'), sub: 'Code: ' + (order.MA_C || na) },
    { ok: !!order.MA_B, label: t('verifyB'), sub: 'Code: ' + (order.MA_B || na) },
    { ok: !!order.MA_A, label: t('verifyA'), sub: 'Code: ' + (order.MA_A || na) },
    { ok: true, label: t('verifyUnique'), sub: t('verifyUniqueSub') + ': ' + code },
  ];

  checks.forEach(function(c) {
    html += '<div class="card" style="display:flex;gap:10px;align-items:flex-start">';
    html += '<div style="width:28px;height:28px;border-radius:50%;background:' + (c.ok ? 'var(--green-soft)' : 'var(--amber-soft)') + ';color:' + (c.ok ? 'var(--green)' : 'var(--amber)') + ';display:grid;place-items:center;font-weight:800;flex-shrink:0">' + (c.ok ? '✓' : '!') + '</div>';
    html += '<div><div style="font-size:11px;font-weight:700">' + c.label + '</div><div style="font-size:10px;color:var(--muted);margin-top:2px">' + c.sub + '</div></div>';
    html += '</div>';
  });
  html += '</div></div>'; // grid, section

  // ── FOOTER ──
  html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:var(--ink);border-radius:14px;color:rgba(255,255,255,.5);font-size:10px">';
  html += '<div><strong style="color:#fff">' + t('footerTitle') + '</strong><br>' + t('footerSub') + '</div>';
  html += '<div style="text-align:right"><span>' + (LANG==='en'?'Data from':'Dữ liệu từ') + '</span><div style="font-size:15px;font-weight:800;color:#fff;margin-top:2px">' + t('footerBrand') + '<span style="color:#2ecc71">.</span>vn</div></div>';
  html += '</div>';

  // Render HTML
  document.getElementById('result-content').innerHTML = html;
  document.getElementById('tb-code').textContent = code;

  // Init map after DOM is ready
  if (plots.length > 0) {
    setTimeout(function() { initMap(plots); }, 100);
  }
}

// ── HELPERS ──────────────────────────────────────────────
function sectionHead(num, title, sub) {
  return '<div class="section-head"><div class="section-num">' + num + '</div>'
    + '<div class="section-title">' + title + '</div>'
    + '<div class="section-sub">' + sub + '</div>'
    + '</div>';
}

function infoRow(label, val, span) {
  return '<div class="info-item' + (span ? ' span-2' : '') + '"><label>' + label + '</label><div class="val">' + (val || '—') + '</div></div>';
}

function metricItem(lbl, val, note) {
  return '<div class="metric-item"><div class="metric-lbl">' + lbl + '</div><div class="metric-val" style="font-size:16px;font-weight:800">' + val + '</div>' + (note ? '<div class="metric-note">' + note + '</div>' : '') + '</div>';
}

// ── MAP ──────────────────────────────────────────────────
function initMap(plots) {
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
  var validPlots = plots.filter(function(p) { return parseFloat(p.KINH_DO) && parseFloat(p.VI_DO); });
  if (!validPlots.length || !window.L) return;

  var map = L.map('map', { zoomControl: true });
  window._leafletMap = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '© OpenStreetMap'
  }).addTo(map);

  var bounds = [];
  validPlots.forEach(function(p) {
    var lat = parseFloat(p.VI_DO), lng = parseFloat(p.KINH_DO);
    var hasCert = p.BANG_CHUNG_PHAP_LY && p.BANG_CHUNG_PHAP_LY !== '—' && p.BANG_CHUNG_PHAP_LY !== '';
    var color = hasCert ? '#0e7c4a' : '#1559c4';
    var marker = L.circleMarker([lat, lng], {
      radius: 7,
      fillColor: color,
      color: '#fff',
      weight: 2,
      fillOpacity: 0.85
    }).addTo(map);
    marker.bindPopup(
      '<strong>' + (p.PLOT_ID || '—') + '</strong><br>'
      + 'Tổ: ' + (p.TO || '—') + '<br>'
      + 'Diện tích: <strong>' + (p.DIEN_TICH_HA || '—') + ' ha</strong><br>'
      + 'Năm trồng: ' + (p.NAM_TRONG || '—') + '<br>'
      + 'Tình trạng: ' + (p.TINH_TRANG_KHAI_THAC || '—') + '<br>'
      + 'Bằng chứng PL: ' + (p.BANG_CHUNG_PHAP_LY || 'Chưa có')
    );
    bounds.push([lat, lng]);
  });

  if (bounds.length === 1) {
    map.setView(bounds[0], 13);
  } else if (bounds.length > 1) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }
}

// ── INLINE SEARCH TỪ TOPBAR ─────────────────────────────
function doSearchFromTopbar() {
  var inp = document.getElementById('inline-search-input') || document.getElementById('kh-search-input');
  if (!inp || !inp.value.trim()) return;
  // Đồng bộ vào search-input gốc
  searchInput.value = inp.value.trim();
  inp.value = '';
  // Reset về search state rồi trigger
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('customer-screen').style.display = 'none';
  document.getElementById('search-screen').style.display = 'none';
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
  doSearch();
}

// ── ESCAPE ATTR ──────────────────────────────────────────
function escapeAttr(s) { return (s||'').replace(/'/g, "\\'"); }

// ── TRANG TỔNG HỢP KHÁCH HÀNG ───────────────────────────
var _cachedOrders = null;

function showCustomerPage(khName, evt) {
  if (evt) evt.preventDefault();
  window._lastKhName = khName;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('customer-screen').style.display = 'block';
  setTimeout(function(){ var btn=document.getElementById('lang-toggle-btn'); if(btn) btn.className='lang-btn dark'; }, 10);
  document.getElementById('kh-name-tb').textContent = khName;
  document.getElementById('customer-content').innerHTML =
    '<div class="loading-wrap"><div class="spinner"></div><span style="font-size:12px;color:var(--muted)">' + t('loading') + '</span></div>';

  function buildCustomerPage(orders) {
    // Match theo cột KHACH_HANG trong sheet
    var matchOrders = orders.filter(function(r) {
      return (r.KHACH_HANG || '').trim() === khName;
    });
    // Fallback: nếu sheet chưa có KHACH_HANG, thử match qua fake getBuyer
    if (matchOrders.length === 0) {
      matchOrders = orders.filter(function(r) {
        return FAKE.getBuyer(r.MA_B || '').name === khName;
      });
    }
    renderCustomerPage(khName, matchOrders, orders);
  }

  if (_cachedOrders) {
    buildCustomerPage(_cachedOrders);
  } else {
    fetchCsv(SHEET_GIDS.fact_xuat_kho).then(function(orders) {
      _cachedOrders = orders;
      buildCustomerPage(orders);
    }).catch(function() {
      document.getElementById('customer-content').innerHTML =
        '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">' + t('errConnect') + '</div></div>';
    });
  }
}

function renderCustomerPage(khName, matchOrders, allOrders) {
  // Lấy thông tin KH: ưu tiên từ sheet, fallback fake
  var buyer;
  if (matchOrders.length > 0 && matchOrders[0].KHACH_HANG) {
    buyer = { name: matchOrders[0].KHACH_HANG.trim(), tax: '—', address: '—' };
  } else {
    var found = allOrders.find(function(r) { return (r.KHACH_HANG||'').trim() === khName || FAKE.getBuyer(r.MA_B||'').name === khName; });
    buyer = found && found.KHACH_HANG ? { name: found.KHACH_HANG.trim(), tax: '—', address: '—' } : FAKE.getBuyer((found||{}).MA_B||'');
    if (!buyer || !buyer.name) buyer = { name: khName, tax: '—', address: '—' };
  }

  var totalKL = matchOrders.reduce(function(s,r){ return s + (parseFloat(r.KL_XUAT_KHO_TONG_KG)||0); }, 0);

  var html = '';

  // Hero nhỏ
  html += '<div style="background:linear-gradient(135deg,#0a1e3d,#0f2d5a);border-radius:16px;padding:22px 28px;color:#fff;margin-bottom:16px">';
  html += '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7defa8;margin-bottom:8px">' + t('khProfile') + '</div>';
  html += '<div style="font-size:20px;font-weight:800;margin-bottom:4px">' + (buyer.name||khName) + '</div>';
  html += '<div style="font-size:11px;color:rgba(255,255,255,.5)">' + (LANG==='en'?'Tax':'MST') + ': ' + (buyer.tax||'—') + ' · ' + (buyer.address||'—') + '</div>';
  html += '<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">';
  html += '<div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 14px"><div style="font-size:18px;font-weight:800">' + matchOrders.length + '</div><div style="font-size:10px;color:rgba(255,255,255,.45)">' + t('khTotalOrders') + '</div></div>';
  html += '<div style="background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 14px"><div style="font-size:18px;font-weight:800">' + Math.round(totalKL).toLocaleString('vi-VN') + '</div><div style="font-size:10px;color:rgba(255,255,255,.45)">' + t('khTotalKg') + '</div></div>';
  html += '</div></div>';

  // Danh sách đơn hàng
  html += '<div class="card" style="padding:0;overflow:hidden">';
  html += '<div style="padding:14px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700">' + t('khOrders') + '</div>';

  if (matchOrders.length === 0) {
    html += '<div class="empty-state"><div class="empty-icon">📋</div>';
    html += '<div class="empty-title">' + t('khNoOrders') + '</div>';
    html += '<div class="empty-sub">' + t('khNoOrdersSub') + '</div></div>';
  } else {
    html += '<div style="padding:8px 16px;background:#f8fafc;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px">';
    html += '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">' + t('khColCode') + '</span>';
    html += '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">' + t('khColDate') + '</span>';
    html += '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">' + t('khColWeight') + '</span>';
    html += '<span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">' + t('khColType') + '</span>';
    html += '</div>';

    matchOrders.forEach(function(r) {
      html += '<div class="kh-order-row" onclick="searchFromCustomer(\'' + escapeAttr(r.MA_XK) + '\')">';
      html += '<span style="font-weight:700;font-family:monospace;color:var(--accent)">' + (r.MA_XK||'—') + '</span>';
      html += '<span style="font-size:12px">' + (r.NGAY_XUAT||'—') + '</span>';
      html += '<span style="font-weight:700">' + (parseFloat(r.KL_XUAT_KHO_TONG_KG)||0).toLocaleString('vi-VN') + ' kg</span>';
      html += '<span class="pill pill-blue" style="font-size:10px">' + (r.LOAI_SAN_PHAM||'—') + '</span>';
      html += '</div>';
    });
  }
  html += '</div>';

  document.getElementById('customer-content').innerHTML = html;
}

function searchFromCustomer(maXK) {
  searchInput.value = maXK;
  document.getElementById('customer-screen').style.display = 'none';
  doSearch();
}

function goBackFromCustomer() {
  document.getElementById('customer-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  setTimeout(function(){ var btn=document.getElementById('lang-toggle-btn'); if(btn) btn.className='lang-btn dark'; }, 10);
  window._lastKhName = null;
}

// ── AUTO-FOCUS ───────────────────────────────────────────
window.addEventListener('load', function() {
  searchInput.focus();
  applyLang();
});
</script>
